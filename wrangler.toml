# Cloudflare Worker/Pages config (from frontend/).
# Requires: npm run build (with @astrojs/cloudflare) then npx wrangler deploy
#
# If deploy fails with "Invalid binding SESSION", create a KV namespace and add:
#   npx wrangler kv:namespace create SESSION
#   [[kv_namespaces]]
#   binding = "SESSION"
#   id = "<id from create output>"

name = "auditor"
compatibility_date = "2025-12-01"
main = "dist/_worker.js/index.js"
compatibility_flags = ["nodejs_compat"]

# Sensitive values (Supabase keys) should be set as secrets so they don't
# appear in source control. Secrets persist across deploys:
#   npx wrangler secret put PUBLIC_SUPABASE_URL
#   npx wrangler secret put PUBLIC_SUPABASE_ANON_KEY
#
# Non-sensitive runtime variables go in [vars] below so they survive deploys.
# Dashboard-only vars get OVERWRITTEN by this file on every `wrangler deploy`.

# Production vars — deployed to Cloudflare Pages.
# For local dev these are overridden by .dev.vars (not committed).
[vars]
PUBLIC_API_URL = "https://auditor.fly.dev"

[[routes]]
pattern = "audit.betteroffgrowth.com"
zone_name = "betteroffgrowth.com"
custom_domain = true

[assets]
directory = "dist"
binding = "ASSETS"
